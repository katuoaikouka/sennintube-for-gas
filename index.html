<!DOCTYPE html>
<html lang="ja" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>仙人Tube</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="仙人Tube">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'yt-white': 'hsl(0, 0%, 100%)',
              'yt-black': '#0f0f0f',
              'yt-light-black': '#272727',
              'yt-light': '#f2f2f2',
              'yt-gray': '#3f3f3f',
              'yt-dark-gray': '#272727',
              'yt-light-gray': '#aaa',
              'yt-red': '#ff0000', // 仙人Tubeカラー
              'yt-blue': '#3ea6ff',
              'yt-spec-10': 'rgba(255, 255, 255, 0.1)',
              'yt-spec-20': 'rgba(255, 255, 255, 0.2)',
              'yt-spec-light-10': 'rgba(0, 0, 0, 0.05)',
              'yt-spec-light-20': 'rgba(0, 0, 0, 0.1)',
            },
            fontFamily: {
              sans: ['Roboto', 'Noto Sans JP', 'sans-serif'],
            }
          }
        }
      }
    </script>

    <style>
      /* カスタムスクロールバーなどの基本定義 */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #717171; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #909090; }
      
      body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
      }

      /* 読み込み中のスケルトンアニメーション */
      .skeleton {
        background: linear-gradient(90deg, #272727 25%, #3f3f3f 50%, #272727 75%);
        background-size: 200% 100%;
        animation: skeleton-loading 1.5s infinite;
      }
      @keyframes skeleton-loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
    </style>

    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">

    <script>
      // 初期テーマ設定 (デフォルトをダークモードへ)
      const theme = localStorage.getItem('theme') || 'dark';
      document.documentElement.className = theme;
    </script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19.0.0",
        "react-dom": "https://esm.sh/react-dom@19.0.0",
        "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
        "react-router-dom": "https://esm.sh/react-router-dom@7.1.0",
        "uuid": "https://esm.sh/uuid@11.0.0",
        "hls.js": "https://esm.sh/hls.js@1.5.0",
        "dayjs": "https://esm.sh/dayjs@1.11.10",
        "dayjs/": "https://esm.sh/dayjs@1.11.10/",
        "@mlc-ai/web-llm": "https://esm.sh/@mlc-ai/web-llm@0.2.46"
      }
    }
    </script>
  </head>
  <body class="bg-white dark:bg-yt-black text-black dark:text-yt-white font-sans transition-colors duration-300">
    <div id="root"></div>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').catch(() => {
            // GAS環境などの制限下では静かに無視
          });
        });
      }
    </script>

    <script type="module" src="index.tsx"></script>
  </body>
</html>
